name: Build ARM64 Aurora Image

on:
  schedule:
    - cron: '0 2 * * *' # Runs daily at 2 AM UTC
  workflow_dispatch: # Allows manual triggering

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/waterfurnace_aurora

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest upstream tag
        id: get_version
        run: |
          # Fetch the most recent tag from the tags list
          LATEST_TAG=$(curl -s https://api.github.com/repos/ccutrer/waterfurnace_aurora/tags | jq -r '.[0].name')

          # Check for null/empty to prevent build failure
          if [ "$LATEST_TAG" == "null" ] || [ -z "$LATEST_TAG" ]; then
            echo "Error: No tags found at upstream repository."
            exit 1
          fi

          # Strip the 'v' (e.g., v1.6.4 -> 1.6.4)
          VERSION=${LATEST_TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Discovered latest upstream version: $VERSION"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image exists
        id: check
        run: |
          # Check if we've already built this specific version
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }} > /dev/null 2>&1; then
            echo "ARM64 image for version ${{ env.VERSION }} already exists. Skipping build."
            echo "build_needed=false" >> $GITHUB_ENV
          else
            echo "New version detected! Proceeding with ARM64 build."
            echo "build_needed=true" >> $GITHUB_ENV
          fi

      - name: Set up QEMU
        if: env.build_needed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: env.build_needed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Build and push ARM64 image
        if: env.build_needed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          build-args: |
            WATERFURNACE_AURORA_VERSION=${{ env.VERSION }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest


